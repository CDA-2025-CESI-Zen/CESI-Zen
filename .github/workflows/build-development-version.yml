name: Development version

on:
  push:
    branches:
      - develop

permissions:
  contents: read
  packages: write
  checks: write

env:
  DOTNET_VERSION: '10.0.x'

jobs:
  tests:
    name: Run development tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore/Build/Test
        run: dotnet test --configuration Release --verbosity normal --logger trx --collect:"XPlat Code Coverage"

      - name: Combine Coverage Reports
        uses: danielpalme/ReportGenerator-GitHub-Action@5.2.4
        with:
          reports: "**/*.cobertura.xml"
          targetdir: "${{ github.workspace }}"
          reporttypes: "Cobertura;Html"
          verbosity: "Info"
          title: "Rapport de tests"
          tag: "${{ github.run_number }}_${{ github.run_id }}"
          toolpath: "reportgeneratortool"

      - name: Upload Combined Coverage XML
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: ${{ github.workspace }}/Cobertura.xml
          retention-days: 5

      - name: Publish Code Coverage Report
        uses: irongut/CodeCoverageSummary@v1.3.0
        with:
          filename: "Cobertura.xml"
          badge: true
          fail_below_min: true
          format: markdown
          hide_branch_rate: false
          hide_complexity: false
          indicators: true
          output: both
          thresholds: "10 30"

      - name: Add Coverage PR Comment
        uses: marocchino/sticky-pull-request-comment@v2
        if: github.event_name == 'pull_request'
        with:
          recreate: true
          path: code-coverage-results.md

      - name: Upload Test Result Files
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: ${{ github.workspace }}/**/TestResults/**/*
          retention-days: 5

      - name: Publish Test Results
        uses: EnricoMi/publish-unit-test-result-action@v2.16.1
        if: always()
        with:
          trx_files: "${{ github.workspace }}/**/*.trx"
          
  docker:
    name: Build & push development images
    runs-on: ubuntu-latest
    needs: tests
  
    outputs:
      front_digest: ${{ steps.front_build.outputs.digest }}
      back_digest: ${{ steps.back_build.outputs.digest }}
  
    steps:
      - name: Checkout
        uses: actions/checkout@v4
  
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
  
      - name: Extract Docker metadata - FrontOffice
        id: front_meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/frontoffice-api
          tags: |
            type=raw,value=latest-dev
  
      - name: Build and push FrontOffice image
        id: front_build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: src/Presentation/FrontOffice.Api/Dockerfile
          push: true
          tags: ${{ steps.front_meta.outputs.tags }}
          labels: ${{ steps.front_meta.outputs.labels }}
  
      - name: Extract Docker metadata - BackOffice
        id: back_meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/backoffice
          tags: |
            type=raw,value=latest-dev
  
      - name: Build and push BackOffice image
        id: back_build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: src/Presentation/BackOffice/Dockerfile
          push: true
          tags: ${{ steps.back_meta.outputs.tags }}
          labels: ${{ steps.back_meta.outputs.labels }}
          
  update-gitops:
    name: Update GitOps manifests
    runs-on: ubuntu-latest
    needs: docker
  
    permissions:
      contents: write
  
    steps:
      - name: Checkout GitOps repository
        uses: actions/checkout@v4
        with:
          repository: CDA-2025-CESI-Zen/CESI-Zen-GitOps
          token: ${{ secrets.GITOPS_REPO_TOKEN }}
          path: gitops
  
      - name: Update image digests
        run: |
          cd gitops
          FILE=overlays/dev/kustomization.yaml

          yq -i '
            (.images[] | select(.name == "ghcr.io/cda-2025-cesi-zen/frontoffice-api")).digest = "${{ needs.docker.outputs.front_digest }}"
          ' "$FILE"

          yq -i '
            (.images[] | select(.name == "ghcr.io/cda-2025-cesi-zen/backoffice")).digest = "${{ needs.docker.outputs.back_digest }}"
          ' "$FILE"
  
      - name: Commit changes
        run: |
          cd gitops
  
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
  
          git add overlays/dev/kustomization.yaml
  
          git diff --cached --quiet && exit 0
  
          git commit -m "Updated image digests"
  
          git push
