name: Development version

on:
  pull_request:
    branches:
      - develop
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: read
  packages: write
  checks: write

env:
  DOTNET_VERSION: '10.0.x'

jobs:
  tests:
    name: Run development tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore

      - name: Clean the solution
        run: dotnet clean

      - name: Build the solution
        run: dotnet build --no-restore --configuration Release

      - name: Run tests
        run: |
          mkdir -p TestResults

          dotnet test \
            --configuration Release \
            --logger "trx;LogFileName=test-results.trx" \
            --results-directory TestResults

      - name: Upload test results artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: TestResults/**/*.trx

  docker:
    name: Build & push development images
    runs-on: ubuntu-latest
    needs: tests
  
    outputs:
      front_digest: ${{ steps.front_build.outputs.digest }}
      back_digest: ${{ steps.back_build.outputs.digest }}
  
    steps:
      - name: Checkout
        uses: actions/checkout@v4
  
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
  
      - name: Extract Docker metadata - FrontOffice
        id: front_meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/frontoffice-api
          tags: |
            type=raw,value=latest-dev
  
      - name: Build and push FrontOffice image
        id: front_build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: src/Presentation/FrontOffice.Api/Dockerfile
          push: true
          tags: ${{ steps.front_meta.outputs.tags }}
          labels: ${{ steps.front_meta.outputs.labels }}
  
      - name: Extract Docker metadata - BackOffice
        id: back_meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/backoffice
          tags: |
            type=raw,value=latest-dev
  
      - name: Build and push BackOffice image
        id: back_build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: src/Presentation/BackOffice/Dockerfile
          push: true
          tags: ${{ steps.back_meta.outputs.tags }}
          labels: ${{ steps.back_meta.outputs.labels }}
          
  update-gitops:
    name: Update GitOps manifests
    runs-on: ubuntu-latest
    needs: docker
  
    permissions:
      contents: write
  
    steps:
      - name: Checkout GitOps repository
        uses: actions/checkout@v4
        with:
          repository: CDA-2025-CESI-Zen/CESI-Zen-GitOps
          token: ${{ secrets.GITOPS_REPO_TOKEN }}
          path: gitops
  
      - name: Install yq
        uses: mikefarah/yq@v4.44.3

      - name: Update image digests
        run: |
          cd gitops
  
          FRONT_DIGEST="${{ needs.docker.outputs.front_digest }}"
          BACK_DIGEST="${{ needs.docker.outputs.back_digest }}"

          FILE=overlays/dev/kustomization.yaml

          yq -i '
            (.images[] | select(.name == "ghcr.io/cda-2025-cesi-zen/frontoffice-api")).digest = strenv(FRONT_DIGEST)
          ' "$FILE"

          yq -i '
            (.images[] | select(.name == "ghcr.io/cda-2025-cesi-zen/backoffice")).digest = strenv(BACK_DIGEST)
          ' "$FILE"
  
      - name: Commit changes
        run: |
          cd gitops
  
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
  
          git add overlays/dev/kustomization.yaml
  
          git diff --cached --quiet && exit 0
  
          git commit -m "chore(dev): update image digests"
  
          git push
