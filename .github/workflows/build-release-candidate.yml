name: Release candidate

on:
  pull_request:
    branches:
      - master
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: read
  packages: write
  checks: write
  issues: write
  pull-requests: write

env:
  DOTNET_VERSION: '10.0.x'

jobs:
  tests:
    name: Run release candidate tests
    runs-on: ubuntu-latest
    if: startsWith(github.head_ref, 'release/')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore/Build/Test
        run: dotnet test --configuration Release --verbosity normal --logger trx --collect:"XPlat Code Coverage"

      - name: Combine Coverage Reports
        uses: danielpalme/ReportGenerator-GitHub-Action@5.2.4
        with:
          reports: "**/*.cobertura.xml"
          targetdir: "${{ github.workspace }}"
          reporttypes: "Cobertura;Html"
          verbosity: "Info"
          title: "Rapport de tests"
          tag: "${{ github.run_number }}_${{ github.run_id }}"
          toolpath: "reportgeneratortool"

      - name: Upload Combined Coverage XML
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: ${{ github.workspace }}/Cobertura.xml
          retention-days: 5

      - name: Publish Code Coverage Report
        uses: irongut/CodeCoverageSummary@v1.3.0
        with:
          filename: "Cobertura.xml"
          badge: true
          fail_below_min: true
          format: markdown
          hide_branch_rate: false
          hide_complexity: false
          indicators: true
          output: both
          thresholds: "10 30"

      - name: Add Coverage PR Comment
        uses: marocchino/sticky-pull-request-comment@v2
        if: github.event_name == 'pull_request'
        with:
          recreate: true
          path: code-coverage-results.md

      - name: Upload Test Result Files
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: ${{ github.workspace }}/**/TestResults/**/*
          retention-days: 5

      - name: Publish Test Results
        uses: EnricoMi/publish-unit-test-result-action@v2.16.1
        if: always()
        with:
          trx_files: "${{ github.workspace }}/**/*.trx"

  docker:
    name: Build & push release candidate images
    runs-on: ubuntu-latest
    needs: tests
    if: success()

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract branch tag
        id: tag
        run: |
          BRANCH_NAME="${{ github.head_ref }}"
          VERSION="v${BRANCH_NAME#release/}"
          PR_NUMBER="${{ github.event.number }}"
      
          RC_TAG="${VERSION}-rc${PR_NUMBER}"
      
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "rc_tag=$RC_TAG" >> $GITHUB_OUTPUT
      
          echo "Version: $VERSION"
          echo "RC Tag: $RC_TAG"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata - FrontOffice
        id: front_meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/frontoffice-api
          tags: |
            type=raw,value=${{ steps.tag.outputs.rc_tag }}

      - name: Build and push FrontOffice image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: src/Presentation/FrontOffice.Api/Dockerfile
          push: true
          tags: ${{ steps.front_meta.outputs.tags }}
          labels: ${{ steps.front_meta.outputs.labels }}

      - name: Extract Docker metadata - BackOffice
        id: back_meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/backoffice
          tags: |
            type=raw,value=${{ steps.tag.outputs.rc_tag }}

      - name: Build and push BackOffice image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: src/Presentation/BackOffice/Dockerfile
          push: true
          tags: ${{ steps.back_meta.outputs.tags }}
          labels: ${{ steps.back_meta.outputs.labels }}
