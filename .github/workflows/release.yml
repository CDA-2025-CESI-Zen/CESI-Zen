name: Release

on:
  push:
    tags:
      - '*'

permissions:
  contents: read
  packages: write
  checks: write

env:
  DOTNET_VERSION: '10.0.x'

jobs:
  tests:
    name: Tests
    runs-on: ubuntu-latest

    outputs:
      git_tag: ${{ steps.tag.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract tag
        id: tag
        run: |
          echo "tag=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore

      - name: Clean the solution
        run: dotnet clean

      - name: Build the solution
        run: dotnet build --no-restore --configuration Release

      - name: Run tests
        run: dotnet test --no-build --configuration Release --logger "trx;LogFileName=test-results.trx" --results-directory TestResults

      - name: Publish test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: 'Test Results'
          path: 'TestResults/*.trx'
          reporter: dotnet-trx
          use-actions-summary: 'true'

  docker:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: tests

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract tag
        id: tag
        run: |
          echo "value=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata - FrontOffice
        id: front_meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/frontoffice-api
          tags: |
            type=raw,value=latest
            type=raw,value=${{ steps.tag.outputs.value }}

      - name: Build and push FrontOffice image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: src/Presentation/FrontOffice.Api/Dockerfile
          push: true
          tags: ${{ steps.front_meta.outputs.tags }}
          labels: ${{ steps.front_meta.outputs.labels }}

      - name: Extract Docker metadata - BackOffice
        id: back_meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/backoffice
          tags: |
            type=raw,value=latest
            type=raw,value=${{ steps.tag.outputs.value }}

      - name: Build and push BackOffice image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: src/Presentation/BackOffice/Dockerfile
          push: true
          tags: ${{ steps.back_meta.outputs.tags }}
          labels: ${{ steps.back_meta.outputs.labels }}
